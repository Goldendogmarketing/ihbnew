<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="iHelpBuild — a spatial index of work. Websites and platforms built by Branden Waters." />
    <title>iHelpBuild — Spatial Portfolio</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect x='2' y='7' width='28' height='18' rx='6' fill='none' stroke='%23e0322c' stroke-width='3'/%3E%3Ctext x='16' y='21' font-family='Arial' font-weight='700' font-size='11' fill='%23e0322c' text-anchor='middle'%3Eihb%3C/text%3E%3C/svg%3E" />
  </head>
  <body>
    <div id="app"></div>
    <div id="vignette" aria-hidden="true"></div>
    <div id="grain" aria-hidden="true"></div>

    <header id="chrome-top" class="chrome">
      <a class="brand" href="https://www.ihelpbuild.com" target="_blank" rel="noreferrer">
        <span class="brand-mark">ihb</span>
        <span class="brand-name">IHELPBUILD</span>
      </a>
      <a class="pill cta" href="https://www.ihelpbuild.com" target="_blank" rel="noreferrer">Let&rsquo;s Talk</a>
    </header>

    <footer id="chrome-bottom" class="chrome chrome-bottom">
      <div class="status"><span id="status-count">07</span> PROJECTS &mdash; SPATIAL INDEX</div>
      <div id="hint" class="hint"><i class="hint-dot"></i><span id="hint-text">Click &amp; drag to look around</span></div>
      <button id="gyro" class="pill ghost" hidden>Enable motion</button>
    </footer>

    <div id="tooltip" class="tooltip" hidden>
      <b class="tt-title"></b>
      <span class="tt-tags"></span>
    </div>

    <section id="detail" class="detail" hidden aria-hidden="true">
      <div class="detail-bg"></div>
      <div class="detail-scroll">
        <div class="detail-inner">
          <div class="detail-head">
            <div class="d-meta">
              <span class="d-client"></span>
              <span class="d-sep">/</span>
              <span class="d-year"></span>
            </div>
            <h1 class="d-title"></h1>
            <div class="d-tags"></div>
          </div>
          <figure class="detail-hero">
            <img class="d-img" alt="" draggable="false" />
          </figure>
          <div class="detail-body">
            <p class="d-blurb"></p>
            <a class="pill d-link" target="_blank" rel="noreferrer">Visit live site &nearr;</a>
          </div>
        </div>
      </div>
      <button id="back" class="pill ghost back" type="button">&larr; Back to gallery</button>
    </section>

    <div id="loader" class="loader">
      <video id="loader-video" muted playsinline preload="auto" aria-hidden="true"></video>
      <div class="loader-fallback" hidden>
        <div class="fallback-logo">ihb</div>
        <div class="fallback-sub">IHELPBUILD &mdash; SPATIAL PORTFOLIO</div>
      </div>
      <div class="loader-progress">
        <span class="pct-label">ENTERING STUDIO</span>
        <div class="bar"><i></i></div>
        <span class="pct">0%</span>
      </div>
      <button id="skip" class="pill ghost" type="button" hidden>Skip intro</button>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
